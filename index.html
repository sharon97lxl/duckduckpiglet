<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HTML5 Boilerplate</title>
    <!-- CSS File -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1 class="noduckelement">Click the Duck</h1>
    <h2 id="noducktext" class="hidden">NOOOOOOOOOOO</h2>
    <h2 id="yesducktext" class="hidden">YIPEEEEE</h2>
    <!--show counter-->
    <div class="countercontainer">
        <p> eggs collected</p>
        <p id="countdisplay">0</p>
    </div>
    
    <div class="container">
        <h3 id="yesducktext2" class="hidden">you found a duck egg! isn't it beautiful?</h3>
        <img id="duckegg"
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTWsfKD8WQGsoiw23JUsfKrG-rfE5H_gWorlA&s"
            class="hidden" alt="duckegg"></img>
        <h3 id="noducktext2" class="hidden"> she fell over and now all your eggs are gone!</h3>

        <!--back buttons-->
        <button id="backbutton" class="hidden">Fix the duck</button>
        <button id="eggbutton" class="hidden">~collect your egg~ </button>

        <!-- images spreadrow-->
        <div class="spreadrow">
            <img class="noduckelement" id="piglet"
                src="https://mspresistantstarch.com/wp-content/uploads/2020/11/piglet_advert1-1536x1022.png"
                alt="piglet"></img>

            <button id="mybutton" class="noduckelement">Don't click here!</button>

            <img id="duck" src="https://lirp.cdn-website.com/2740280e/dms3rep/multi/opt/Auggie-2a12d0bb-1920w.jpg"
                alt="duck"></img>

            <img id="flatduck" class="hidden"
                src="https://lirp.cdn-website.com/2740280e/dms3rep/multi/opt/Auggie-2a12d0bb-1920w.jpg"
                alt="duck"></img>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>

</html>
